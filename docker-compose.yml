version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: trustloop-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: trustloop
    volumes:
      - mongo_data:/data/db
    networks:
      - trustloop-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: trustloop-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/trustloop
      PORT: 4000
      CORS_ORIGIN: http://localhost:5174,http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - trustloop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:

networks:
  trustloop-network:
    driver: bridge
